<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>🧮 수학 게임</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Apple SD Gothic Neo','Malgun Gothic','Segoe UI',sans-serif;
  background:linear-gradient(135deg,#1a0520 0%,#420d30 50%,#1a0520 100%);
  min-height:100vh;display:flex;align-items:flex-start;
  justify-content:center;padding:20px 14px;
}
#app{width:100%;max-width:720px}
.scr{display:none;flex-direction:column;align-items:center;gap:12px}
.scr.show{display:flex;animation:fadeUp .3s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ══ HOME ══ */
.h-logo{font-size:60px;line-height:1}
.h-title{font-size:32px;font-weight:900;color:#fff;
  text-shadow:0 0 40px rgba(255,105,180,.6);text-align:center}
.h-sub{font-size:13px;color:rgba(255,255,255,.4)}
.stage-grid{display:grid;grid-template-columns:1fr 1fr;
  gap:11px;width:100%;max-width:480px;margin-top:4px}
.s-btn{border:none;border-radius:20px;padding:20px 17px 16px;cursor:pointer;
  display:flex;flex-direction:column;align-items:flex-start;gap:3px;
  transition:transform .12s}
.s-btn:hover{transform:translateY(-2px)}
.s-btn:active{transform:scale(.94)}
.s-num{font-size:21px;font-weight:900;color:#fff}
.s-name{font-size:13px;font-weight:700;color:rgba(255,255,255,.85)}
.s-range{font-size:11px;color:rgba(255,255,255,.5);margin-top:1px}
.s-aw{font-size:10px;font-weight:700;color:rgba(255,255,255,.75);
  background:rgba(0,0,0,.2);border-radius:8px;padding:3px 8px;margin-top:6px}
.s1{background:linear-gradient(140deg,#ff6bae,#e91e8c);box-shadow:0 6px 22px rgba(233,30,140,.3)}
.s2{background:linear-gradient(140deg,#f953c6,#9c27b0);box-shadow:0 6px 22px rgba(249,83,198,.3)}
.s3{background:linear-gradient(140deg,#c2185b,#880e4f);box-shadow:0 6px 22px rgba(194,24,91,.3)}
.s4{background:linear-gradient(140deg,#ad1457,#6a0f3a);box-shadow:0 6px 22px rgba(173,20,87,.3)}

/* ══ GAME TOP ══ */
.g-bar{display:flex;align-items:center;justify-content:space-between;width:100%}
.g-badge{font-size:12px;font-weight:700;color:rgba(255,255,255,.55);
  background:rgba(255,255,255,.08);padding:5px 14px;border-radius:20px;
  border:1px solid rgba(255,105,180,.25)}
.g-cnt{font-size:13px;font-weight:700;color:rgba(255,255,255,.4)}
.g-hb{width:100%;font-size:11px;font-weight:700;text-align:center;
  color:rgba(255,255,255,.0);background:rgba(255,105,180,.08);
  border-radius:10px;padding:5px 12px;transition:all .3s}
.g-hb.on{color:rgba(255,180,220,.85)}
.prog-wrap{width:100%;height:6px;background:rgba(255,255,255,.1);
  border-radius:100px;overflow:hidden}
.prog-fill{height:100%;border-radius:100px;
  background:linear-gradient(90deg,#f953c6,#e91e8c);
  transition:width .5s ease;width:0%}

/* ══ MAIN LAYOUT: hint left + problem right ══ */
.g-main{display:flex;flex-direction:row;gap:12px;
  width:100%;align-items:flex-start}

/* ── Hint panel ── */
.hint-card{
  width:196px;flex-shrink:0;order:1;
  background:rgba(255,20,147,.07);
  border:1px solid rgba(255,105,180,.22);
  border-radius:18px;padding:14px 14px;
}
.hint-tog{
  width:100%;border:none;border-radius:10px;
  background:rgba(255,105,180,.18);
  color:#ffb6e0;font-size:12px;font-weight:800;
  padding:8px 10px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:background .15s;letter-spacing:.2px;
}
.hint-tog:hover{background:rgba(255,105,180,.3)}
.hnt-body{
  font-size:12px;color:rgba(255,255,255,.72);line-height:1.9;
  display:none;margin-top:12px;
  animation:revealHint .25s ease;
}
.hnt-body.open{display:block}
@keyframes revealHint{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.hr{display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.hlb{font-size:10px;font-weight:700;color:rgba(255,150,200,.65);min-width:50px}
.heq{font-size:12.5px;color:rgba(255,255,255,.88)}
.hunit{font-size:11px;color:rgba(255,180,220,.55);margin-left:2px}
.harr{text-align:center;font-size:15px;color:rgba(255,105,180,.45);margin:3px 0}
.hfin{font-size:13px;font-weight:800;color:#ffc0de;
  border-top:1px solid rgba(255,105,180,.15);padding-top:8px;margin-top:6px}
.hdots{font-size:14px;line-height:2;word-break:break-all}

/* ── Problem + choices ── */
.prob-panel{flex:1;order:2;display:flex;flex-direction:column;gap:11px}

.pcard{
  width:100%;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,105,180,.15);border-radius:20px;
  padding:28px 18px 22px;text-align:center;
  position:relative;overflow:hidden;
}
.peq{font-size:clamp(30px,6.5vw,52px);font-weight:900;
  color:#fff;line-height:1.2;letter-spacing:.5px}
.pop{color:rgba(255,105,180,.4);margin:0 8px;font-weight:300}
.pq{color:#ff69b4}
.pline{width:62%;height:2px;background:rgba(255,105,180,.15);
  border-radius:100px;margin:10px auto}
.pfb{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;border-radius:20px;
  pointer-events:none;opacity:0;transition:opacity .15s}
.pfb.on{opacity:1}
.pfb.ok{background:rgba(52,211,153,.15)}
.pfb.ng{background:rgba(248,113,113,.15)}
.pfb-ico{font-size:48px}
.pfb-txt{font-size:17px;font-weight:800;color:#fff;margin-top:5px}

/* ── Choices: wide single-column ── */
.choices{display:flex;flex-direction:column;gap:9px;width:100%}
.ch{border-radius:15px;border:2px solid rgba(255,105,180,.2);
  background:rgba(255,255,255,.07);padding:14px 18px;
  display:flex;align-items:center;gap:14px;cursor:pointer;
  transition:all .13s;color:#fff;text-align:left;width:100%}
.ch:hover:not(:disabled){background:rgba(255,105,180,.15);
  border-color:rgba(255,105,180,.5)}
.ch:active:not(:disabled){transform:scale(.98)}
.ch:disabled{cursor:default}
.ch-ltr{
  width:30px;height:30px;border-radius:50%;flex-shrink:0;
  background:rgba(255,105,180,.18);border:1.5px solid rgba(255,150,200,.5);
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:800;color:rgba(255,180,210,.85)}
.ch-val{font-size:clamp(19px,4.5vw,28px);font-weight:900;color:#fff}
.ch-ico{margin-left:auto;font-size:18px;opacity:0;transition:opacity .15s;flex-shrink:0}
.ch.ok{background:rgba(52,211,153,.22)!important;border-color:#34d399!important}
.ch.ok .ch-val{color:#34d399!important}
.ch.ok .ch-ltr{background:#34d399!important;border-color:#34d399!important;color:#fff!important}
.ch.ok .ch-ico{opacity:1!important;color:#34d399}
.ch.ng{background:rgba(248,113,113,.18)!important;border-color:#f87171!important}
.ch.ng .ch-val{color:#f87171!important}
.ch.ng .ch-ltr{background:#f87171!important;border-color:#f87171!important;color:#fff!important}
.ch.ng .ch-ico{opacity:1!important;color:#f87171}

/* ── 뺄셈 단계 색상 ── */
.s5{background:linear-gradient(140deg,#4fc3f7,#0288d1);box-shadow:0 6px 22px rgba(2,136,209,.3)}
.s6{background:linear-gradient(140deg,#29b6f6,#0277bd);box-shadow:0 6px 22px rgba(41,182,246,.3)}
.s7{background:linear-gradient(140deg,#26c6da,#00838f);box-shadow:0 6px 22px rgba(0,172,193,.3)}
.s8{background:linear-gradient(140deg,#00acc1,#004d58);box-shadow:0 6px 22px rgba(0,172,193,.3)}

/* ── 섹션 구분 ── */
.sec-div{
  width:100%;max-width:480px;
  display:flex;align-items:center;gap:10px;
  font-size:12px;font-weight:800;letter-spacing:.06em;
  color:rgba(255,255,255,.42);margin-top:8px;
}
.sec-div::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.1)}

/* ══ ANIMATIONS ══ */
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}60%{transform:translateX(8px)}}
@keyframes pop{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
.shake{animation:shake .3s ease}
.pop{animation:pop .25s ease}

/* ══ RESPONSIVE ══ */
@media(max-width:560px){
  .g-main{flex-direction:column}
  .hint-card{width:100%;order:2}
  .prob-panel{order:1}
}

/* ══ RESULT ══ */
.rcard{width:100%;max-width:480px;background:rgba(255,255,255,.06);
  border:1px solid rgba(255,105,180,.15);border-radius:22px;
  padding:30px 22px 26px;text-align:center}
.r-ico{font-size:64px;line-height:1;margin-bottom:10px}
.r-pts{font-size:66px;font-weight:900;color:#ffc0de;line-height:1}
.r-max{font-size:18px;color:rgba(255,255,255,.3)}
.r-stars{font-size:26px;letter-spacing:5px;margin:10px 0}
.r-tag{display:inline-block;padding:7px 22px;border-radius:100px;
  font-size:13px;font-weight:800;margin:8px 0}
.tok{background:rgba(52,211,153,.2);color:#34d399;border:1px solid rgba(52,211,153,.3)}
.tng{background:rgba(248,113,113,.2);color:#f87171;border:1px solid rgba(248,113,113,.3)}
.r-title{font-size:23px;font-weight:900;color:#fff;margin-bottom:8px}
.r-msg{font-size:14px;color:rgba(255,255,255,.6);line-height:1.75}
.rb1{width:100%;max-width:480px;
  background:linear-gradient(135deg,#f953c6,#e91e8c);
  border:none;border-radius:15px;padding:17px;font-size:16px;
  font-weight:800;color:#fff;cursor:pointer;
  box-shadow:0 6px 20px rgba(249,83,198,.35);
  transition:transform .1s}
.rb1:hover{transform:scale(1.02)}
.rb1:active{transform:scale(.97)}
.rb2{width:100%;max-width:480px;background:transparent;
  border:1px solid rgba(255,255,255,.12);border-radius:15px;padding:14px;
  font-size:14px;font-weight:700;color:rgba(255,255,255,.45);
  cursor:pointer;transition:all .15s}
.rb2:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.8)}
</style>
</head>
<body>
<div id="app">

<!-- ══════ HOME ══════ -->
<div id="home" class="scr show">
  <div class="h-logo">🧮</div>
  <div class="h-title">수학 게임</div>
  <div class="h-sub">단계를 선택해서 시작해요!</div>

  <div class="sec-div">➕ 덧셈</div>
  <div class="stage-grid">
    <button class="s-btn s1" onclick="go(1)">
      <div class="s-num">1단계</div>
      <div class="s-name">한 자리 덧셈</div>
      <div class="s-range">1 ~ 9</div>
    </button>
    <button class="s-btn s2" onclick="go(2)">
      <div class="s-num">2단계</div>
      <div class="s-name">두 자리 덧셈</div>
      <div class="s-range">10 ~ 99</div>
      <div class="s-aw">💰 80점 이상 → 용돈</div>
    </button>
    <button class="s-btn s3" onclick="go(3)">
      <div class="s-num">3단계</div>
      <div class="s-name">세 자리 덧셈</div>
      <div class="s-range">100 ~ 999</div>
      <div class="s-aw">💰 60점 이상 → 용돈</div>
    </button>
    <button class="s-btn s4" onclick="go(4)">
      <div class="s-num">4단계</div>
      <div class="s-name">네 자리 덧셈</div>
      <div class="s-range">1000 ~ 9999</div>
      <div class="s-aw">💰 50점 이상 → 용돈</div>
    </button>
  </div>

  <div class="sec-div">➖ 뺄셈</div>
  <div class="stage-grid">
    <button class="s-btn s5" onclick="go(5)">
      <div class="s-num">5단계</div>
      <div class="s-name">한 자리 뺄셈</div>
      <div class="s-range">1 ~ 9</div>
    </button>
    <button class="s-btn s6" onclick="go(6)">
      <div class="s-num">6단계</div>
      <div class="s-name">두 자리 뺄셈</div>
      <div class="s-range">10 ~ 99</div>
      <div class="s-aw">💰 80점 이상 → 용돈</div>
    </button>
    <button class="s-btn s7" onclick="go(7)">
      <div class="s-num">7단계</div>
      <div class="s-name">세 자리 뺄셈</div>
      <div class="s-range">100 ~ 999</div>
      <div class="s-aw">💰 60점 이상 → 용돈</div>
    </button>
    <button class="s-btn s8" onclick="go(8)">
      <div class="s-num">8단계</div>
      <div class="s-name">네 자리 뺄셈</div>
      <div class="s-range">1000 ~ 9999</div>
      <div class="s-aw">💰 50점 이상 → 용돈</div>
    </button>
  </div>
</div>

<!-- ══════ GAME ══════ -->
<div id="game" class="scr">
  <div class="g-bar">
    <span class="g-badge" id="g-badge">2단계</span>
    <span class="g-cnt" id="g-cnt">1 / 10</span>
  </div>
  <div class="g-hb" id="g-hb">🔥 더 어려운 문제가 시작돼요!</div>
  <div class="prog-wrap"><div class="prog-fill" id="prog"></div></div>

  <div class="g-main">

    <!-- 힌트 패널 (데스크탑: 왼쪽 / 모바일: 아래) -->
    <div class="hint-card">
      <button class="hint-tog" id="hint-tog" onclick="toggleHint()">
        <span>💡</span> 힌트 보기
      </button>
      <div class="hnt-body" id="hnt-body"></div>
    </div>

    <!-- 문제 + 선택지 -->
    <div class="prob-panel">
      <div class="pcard" id="pcard">
        <div class="peq">
          <span id="na"></span><span class="pop" id="op-sign">+</span><span id="nb"></span><span class="pop">=</span><span class="pq">?</span>
        </div>
        <div class="pline"></div>
        <div class="pfb" id="pfb">
          <div class="pfb-ico" id="pfb-ico"></div>
          <div class="pfb-txt" id="pfb-txt"></div>
        </div>
      </div>
      <div class="choices" id="choices"></div>
    </div>

  </div>
</div>

<!-- ══════ RESULT ══════ -->
<div id="result" class="scr">
  <div class="rcard">
    <div class="r-ico" id="r-ico">💖</div>
    <div class="r-pts" id="r-pts">80</div>
    <div class="r-max">/ 100점</div>
    <div class="r-stars" id="r-stars">⭐⭐⭐⭐</div>
    <div class="r-tag" id="r-tag"></div>
    <div class="r-title" id="r-title"></div>
    <div class="r-msg" id="r-msg"></div>
  </div>
  <button class="rb1" onclick="replay()">🔄 다시 도전하기</button>
  <button class="rb2" onclick="goHome()">🏠 다른 단계 선택</button>
</div>

</div>
<script>
const R=(a,b)=>Math.floor(Math.random()*(b-a+1))+a;

/* ────────────────────────────────────────
   문제 생성
   idx 0~4: 쉬운 / idx 5~9: 어려운
   stage 1~4: 덧셈 / stage 5~8: 뺄셈
──────────────────────────────────────── */
function gen(stage,idx){
  const hard=idx>=5;
  let a,b;

  if(stage<=4){
    /* 덧셈 */
    switch(stage){
      case 1:a=R(1,9);b=R(1,9);break;
      case 2:a=hard?R(1,9)*10+R(1,9):R(1,9)*10;b=hard?R(1,9)*10+R(1,9):R(1,9)*10;break;
      case 3:a=hard?R(1,9)*100+R(1,9)*10:R(1,9)*100;b=hard?R(1,9)*100+R(1,9)*10:R(1,9)*100;break;
      case 4:a=hard?R(1,9)*1000+R(1,9)*100:R(1,9)*1000;b=hard?R(1,9)*1000+R(1,9)*100:R(1,9)*1000;break;
    }
    return{a,b,ans:a+b,hard};
  } else {
    /* 뺄셈 — 받아내림 없이 생성 (힌트 자릿수 분해 정확성 보장) */
    switch(stage){
      case 5:
        a=R(1,9);b=R(0,a);
        break;
      case 6:
        if(!hard){a=R(2,9)*10;b=R(1,a/10-1)*10;}
        else{const ta=R(2,9),oa=R(0,9),tb=R(1,ta-1),ob=R(0,oa);a=ta*10+oa;b=tb*10+ob;}
        break;
      case 7:
        if(!hard){a=R(2,9)*100;b=R(1,a/100-1)*100;}
        else{const ha=R(2,9),ta=R(1,9),hb=R(1,ha-1),tb=R(0,ta);a=ha*100+ta*10;b=hb*100+tb*10;}
        break;
      case 8:
        if(!hard){a=R(2,9)*1000;b=R(1,a/1000-1)*1000;}
        else{const tha=R(2,9),ha=R(1,9),thb=R(1,tha-1),hb=R(0,ha);a=tha*1000+ha*100;b=thb*1000+hb*100;}
        break;
    }
    return{a,b,ans:a-b,hard};
  }
}

/* ────────────────────────────────────────
   4지선다 선택지 생성
──────────────────────────────────────── */
function makeChoices(ans,stage,hard){
  const s=stage<=4?stage:stage-4; /* 뺄셈 단계를 1~4로 정규화 */
  const unit=s===1?1:hard?(s===2?1:s===3?10:100):(s===2?10:s===3?100:1000);
  const big=s===1?1:s===2?10:s===3?100:1000;
  const pool=new Set([ans]);
  const offs=hard
    ?[-unit,unit,-big,big,-(big+unit),big+unit,-(big-unit),big-unit,-2*unit,2*unit]
    :[-big,big,-2*big,2*big,-3*big,3*big,-4*big,4*big];
  for(const o of offs){
    if(pool.size>=4)break;
    const w=ans+o;
    if(w>=0)pool.add(w); /* 뺄셈 결과 0 허용 */
  }
  for(let i=1;pool.size<4;i++){const w=ans+i*unit;if(!pool.has(w)&&w>=0)pool.add(w);}
  return[...pool].slice(0,4).sort(()=>Math.random()-.5);
}

/* ────────────────────────────────────────
   힌트 HTML 생성 (덧셈)
──────────────────────────────────────── */
function buildHint(a,b,stage,hard){
  if(stage>=5)return buildHintSub(a,b,stage,hard);
  const ans=a+b;

  if(stage===1){
    const da='<span style="color:#ff9ecb">'+('●'.repeat(a))+'</span>';
    const db='<span style="color:#ffd700">'+('●'.repeat(b))+'</span>';
    return `<div class="hdots">${da} <small style="color:rgba(255,255,255,.4)">${a}개</small><br>+&nbsp;${db} <small style="color:rgba(255,255,255,.4)">${b}개</small></div>
      <div class="harr">↓</div>
      <div class="hfin">${a} + ${b} = <b>${ans}</b></div>`;
  }
  if(stage===2&&!hard){
    const da=a/10,db=b/10;
    return `<div class="hr"><span class="hlb">십의 자리</span></div>
      <div class="hr"><span class="heq"><b>${da}</b> + <b>${db}</b> = <b>${da+db}</b></span></div>
      <div class="harr">↓</div>
      <div class="hr"><span class="heq">${da+db} × 10 = <b>${ans}</b></span></div>
      <div class="hfin">${a} + ${b} = ${ans}</div>`;
  }
  if(stage===2&&hard){
    const ta=Math.floor(a/10),oa=a%10,tb=Math.floor(b/10),ob=b%10;
    const ts=(ta+tb)*10,os=oa+ob;
    return `<div class="hr"><span class="hlb">십의 자리</span><span class="heq">${ta}+${tb}=<b>${ta+tb}</b></span><span class="hunit">→${ts}</span></div>
      <div class="hr"><span class="hlb">일의 자리</span><span class="heq">${oa}+${ob}=<b>${os}</b></span></div>
      <div class="harr">↓</div>
      <div class="hfin">${ts} + ${os} = ${ans}</div>`;
  }
  if(stage===3&&!hard){
    const da=a/100,db=b/100;
    return `<div class="hr"><span class="hlb">백의 자리</span></div>
      <div class="hr"><span class="heq"><b>${da}</b> + <b>${db}</b> = <b>${da+db}</b></span></div>
      <div class="harr">↓</div>
      <div class="hr"><span class="heq">${da+db} × 100 = <b>${ans}</b></span></div>
      <div class="hfin">${a} + ${b} = ${ans}</div>`;
  }
  if(stage===3&&hard){
    const ha=Math.floor(a/100),ta=Math.floor((a%100)/10);
    const hb=Math.floor(b/100),tb=Math.floor((b%100)/10);
    const hs=(ha+hb)*100,ts=(ta+tb)*10;
    return `<div class="hr"><span class="hlb">백의 자리</span><span class="heq">${ha}+${hb}=<b>${ha+hb}</b></span><span class="hunit">→${hs}</span></div>
      <div class="hr"><span class="hlb">십의 자리</span><span class="heq">${ta}+${tb}=<b>${ta+tb}</b></span><span class="hunit">→${ts}</span></div>
      <div class="harr">↓</div>
      <div class="hfin">${hs} + ${ts} = ${ans}</div>`;
  }
  if(stage===4&&!hard){
    const da=a/1000,db=b/1000;
    return `<div class="hr"><span class="hlb">천의 자리</span></div>
      <div class="hr"><span class="heq"><b>${da}</b> + <b>${db}</b> = <b>${da+db}</b></span></div>
      <div class="harr">↓</div>
      <div class="hr"><span class="heq">${da+db} × 1000 = <b>${ans}</b></span></div>
      <div class="hfin">${a} + ${b} = ${ans}</div>`;
  }
  if(stage===4&&hard){
    const tha=Math.floor(a/1000),ha=Math.floor((a%1000)/100);
    const thb=Math.floor(b/1000),hb=Math.floor((b%1000)/100);
    const ths=(tha+thb)*1000,hs=(ha+hb)*100;
    return `<div class="hr"><span class="hlb">천의 자리</span><span class="heq">${tha}+${thb}=<b>${tha+thb}</b></span><span class="hunit">→${ths}</span></div>
      <div class="hr"><span class="hlb">백의 자리</span><span class="heq">${ha}+${hb}=<b>${ha+hb}</b></span><span class="hunit">→${hs}</span></div>
      <div class="harr">↓</div>
      <div class="hfin">${ths} + ${hs} = ${ans}</div>`;
  }
  return '';
}

/* ────────────────────────────────────────
   힌트 HTML 생성 (뺄셈)
──────────────────────────────────────── */
function buildHintSub(a,b,stage,hard){
  const ans=a-b;

  if(stage===5){
    const da='<span style="color:#7dd3fc">'+('●'.repeat(a))+'</span>';
    const dr=ans>0?'<span style="color:#86efac">'+('●'.repeat(ans))+'</span>':'<span style="color:rgba(255,255,255,.4)">(없음)</span>';
    return `<div class="hdots">${da} <small style="color:rgba(255,255,255,.4)">${a}개</small></div>
      <div class="harr">−${b}개 제거</div>
      <div class="hdots">${dr} <small style="color:rgba(255,255,255,.4)">${ans}개 남음</small></div>
      <div class="harr">↓</div>
      <div class="hfin">${a} − ${b} = <b>${ans}</b></div>`;
  }
  if(stage===6&&!hard){
    const da=a/10,db=b/10;
    return `<div class="hr"><span class="hlb">십의 자리</span></div>
      <div class="hr"><span class="heq"><b>${da}</b> − <b>${db}</b> = <b>${da-db}</b></span></div>
      <div class="harr">↓</div>
      <div class="hr"><span class="heq">${da-db} × 10 = <b>${ans}</b></span></div>
      <div class="hfin">${a} − ${b} = ${ans}</div>`;
  }
  if(stage===6&&hard){
    const ta=Math.floor(a/10),oa=a%10,tb=Math.floor(b/10),ob=b%10;
    const ts=(ta-tb)*10,os=oa-ob;
    return `<div class="hr"><span class="hlb">십의 자리</span><span class="heq">${ta}−${tb}=<b>${ta-tb}</b></span><span class="hunit">→${ts}</span></div>
      <div class="hr"><span class="hlb">일의 자리</span><span class="heq">${oa}−${ob}=<b>${os}</b></span></div>
      <div class="harr">↓</div>
      <div class="hfin">${ts} + ${os} = ${ans}</div>`;
  }
  if(stage===7&&!hard){
    const da=a/100,db=b/100;
    return `<div class="hr"><span class="hlb">백의 자리</span></div>
      <div class="hr"><span class="heq"><b>${da}</b> − <b>${db}</b> = <b>${da-db}</b></span></div>
      <div class="harr">↓</div>
      <div class="hr"><span class="heq">${da-db} × 100 = <b>${ans}</b></span></div>
      <div class="hfin">${a} − ${b} = ${ans}</div>`;
  }
  if(stage===7&&hard){
    const ha=Math.floor(a/100),ta=Math.floor((a%100)/10);
    const hb=Math.floor(b/100),tb=Math.floor((b%100)/10);
    const hs=(ha-hb)*100,ts=(ta-tb)*10;
    return `<div class="hr"><span class="hlb">백의 자리</span><span class="heq">${ha}−${hb}=<b>${ha-hb}</b></span><span class="hunit">→${hs}</span></div>
      <div class="hr"><span class="hlb">십의 자리</span><span class="heq">${ta}−${tb}=<b>${ta-tb}</b></span><span class="hunit">→${ts}</span></div>
      <div class="harr">↓</div>
      <div class="hfin">${hs} + ${ts} = ${ans}</div>`;
  }
  if(stage===8&&!hard){
    const da=a/1000,db=b/1000;
    return `<div class="hr"><span class="hlb">천의 자리</span></div>
      <div class="hr"><span class="heq"><b>${da}</b> − <b>${db}</b> = <b>${da-db}</b></span></div>
      <div class="harr">↓</div>
      <div class="hr"><span class="heq">${da-db} × 1000 = <b>${ans}</b></span></div>
      <div class="hfin">${a} − ${b} = ${ans}</div>`;
  }
  if(stage===8&&hard){
    const tha=Math.floor(a/1000),ha=Math.floor((a%1000)/100);
    const thb=Math.floor(b/1000),hb=Math.floor((b%1000)/100);
    const ths=(tha-thb)*1000,hs=(ha-hb)*100;
    return `<div class="hr"><span class="hlb">천의 자리</span><span class="heq">${tha}−${thb}=<b>${tha-thb}</b></span><span class="hunit">→${ths}</span></div>
      <div class="hr"><span class="hlb">백의 자리</span><span class="heq">${ha}−${hb}=<b>${ha-hb}</b></span><span class="hunit">→${hs}</span></div>
      <div class="harr">↓</div>
      <div class="hfin">${ths} + ${hs} = ${ans}</div>`;
  }
  return '';
}

/* ── 게임 상태 ── */
let stage=1,probs=[],cur=0,score=0,canAns=true;

function go(s){
  stage=s;cur=0;score=0;canAns=true;
  probs=Array.from({length:10},(_,i)=>gen(s,i));
  document.getElementById('g-badge').textContent=s+'단계';
  document.getElementById('prog').style.width='0%';
  document.getElementById('g-hb').className='g-hb';
  showScr('game');
  loadQ();
}

function loadQ(){
  const p=probs[cur];
  document.getElementById('na').textContent=p.a;
  document.getElementById('nb').textContent=p.b;
  document.getElementById('op-sign').textContent=stage>=5?'−':'+';
  document.getElementById('g-cnt').textContent=(cur+1)+' / 10';

  /* 힌트 초기화 */
  document.getElementById('hnt-body').innerHTML=buildHint(p.a,p.b,stage,p.hard);
  document.getElementById('hnt-body').classList.remove('open');
  document.getElementById('hint-tog').innerHTML='<span>💡</span> 힌트 보기';

  /* 선택지 생성 */
  const choices=makeChoices(p.ans,stage,p.hard);
  const grid=document.getElementById('choices');
  grid.innerHTML='';
  ['A','B','C','D'].forEach((ltr,i)=>{
    const btn=document.createElement('button');
    btn.className='ch';btn.dataset.val=choices[i];
    btn.innerHTML=`<span class="ch-ltr">${ltr}</span><span class="ch-val">${choices[i]}</span><span class="ch-ico"></span>`;
    btn.onclick=()=>pick(choices[i],btn);
    grid.appendChild(btn);
  });

  /* 카드 초기화 */
  document.getElementById('pcard').className='pcard';
  document.getElementById('pfb').className='pfb';

  /* 6번째 문제 알림 (어려운 문제 시작) */
  if(cur===5&&stage>1&&stage!==5){
    const hb=document.getElementById('g-hb');
    hb.className='g-hb on';
    setTimeout(()=>hb.className='g-hb',2600);
  }
  canAns=true;
}

function pick(val,btn){
  if(!canAns)return;
  canAns=false;
  const p=probs[cur];
  const ok=val===p.ans;
  if(ok)score+=10;

  /* 프로그레스 */
  document.getElementById('prog').style.width=((cur+1)/10*100)+'%';

  /* 버튼 상태 */
  document.querySelectorAll('.ch').forEach(b=>{
    b.disabled=true;
    if(+b.dataset.val===p.ans){
      b.classList.add('ok');
      b.querySelector('.ch-ico').textContent='✓';
    }
  });
  if(!ok){
    btn.classList.add('ng');
    btn.querySelector('.ch-ico').textContent='✗';
  }

  /* 카드 피드백 */
  const pcard=document.getElementById('pcard');
  const pfb=document.getElementById('pfb');
  document.getElementById('pfb-ico').textContent=ok?'✅':'❌';
  document.getElementById('pfb-txt').textContent=ok?'+10점!':'정답: '+p.ans;
  pfb.className='pfb on '+(ok?'ok':'ng');
  pcard.classList.add(ok?'pop':'shake');

  setTimeout(()=>{cur++;if(cur>=10)showResult();else loadQ();},1300);
}

/* ── 결과 ── */
function showResult(){
  const stars=Math.round(score/20);
  document.getElementById('r-pts').textContent=score;
  document.getElementById('r-stars').textContent='⭐'.repeat(stars)+'☆'.repeat(5-stars);
  const r=getResult(stage,score);
  document.getElementById('r-ico').textContent=r.ico;
  const tag=document.getElementById('r-tag');
  tag.textContent=r.tag;tag.className='r-tag '+(r.rew?'tok':'tng');
  document.getElementById('r-title').textContent=r.title;
  document.getElementById('r-msg').innerHTML=r.msg;
  showScr('result');
}

function getResult(s,sc){
  const names={1:'한 자리 덧셈',2:'두 자리 덧셈',3:'세 자리 덧셈',4:'네 자리 덧셈',
               5:'한 자리 뺄셈',6:'두 자리 뺄셈',7:'세 자리 뺄셈',8:'네 자리 뺄셈'};
  const nexts={1:'2단계',5:'6단계'};

  if(s===1||s===5){
    const nm=names[s],nx=nexts[s];
    if(sc>=80)return{ico:'🎉',tag:'🌟 훌륭해요!',title:nm+' 완료!',msg:`정말 잘했어요! ${nx}도 도전해봐요! 💪`,rew:true};
    return{ico:'😊',tag:'👍 잘했어요!',title:'조금 더 연습해봐요!',msg:`다시 도전해서 ${nx}에 도전해봐요!`,rew:false};
  }
  const TH={2:80,3:60,4:50,6:80,7:60,8:50};
  const th=TH[s];
  if(sc>=th)return{ico:'💰',tag:'💰 용돈 받기!',rew:true,title:'대단해요!',
    msg:`<b style="color:#ffc0de;font-size:16px">${sc}점</b> 달성! 기준 ${th}점 이상이에요!<br><br>📣 엄마 아빠한테 이 화면을 보여주고 용돈 받아요! 🎊`};
  const pu=[
    {ico:'🎤',tag:'🎤 장기자랑!',title:'장기자랑 시간!',msg:'엄마 아빠 앞에서 노래나 춤을 보여줘요! 🎵'},
    {ico:'💆',tag:'💆 안마해주기!',title:'안마 쿠폰 발동!',msg:'엄마 아빠 어깨를 주물러 드려요! 💪'}
  ][Math.random()<.5?0:1];
  return{...pu,rew:false,
    msg:pu.msg+`<br><br><small style="color:rgba(255,255,255,.4)">이번 점수: ${sc}점 | ${th}점 이상이면 용돈 받을 수 있어요!</small>`};
}

function toggleHint(){
  const body=document.getElementById('hnt-body');
  const btn=document.getElementById('hint-tog');
  const open=body.classList.toggle('open');
  btn.innerHTML=open?'<span>🙈</span> 힌트 숨기기':'<span>💡</span> 힌트 보기';
}
function replay(){go(stage);}
function goHome(){showScr('home');}
function showScr(id){
  document.querySelectorAll('.scr').forEach(s=>s.classList.remove('show'));
  document.getElementById(id).classList.add('show');
}
</script>
