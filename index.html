<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍭 달콤한 수학</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="달콤한 수학">
<meta name="theme-color" content="#FF69B4">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;font-family:'Comic Sans MS',cursive,sans-serif;background:linear-gradient(135deg,#FFE4F0 0%,#FFF0F8 40%,#F0E8FF 100%);}
@keyframes bounceIn{0%{transform:scale(0.3);opacity:0}50%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}
@keyframes popIn{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.04)}}
@keyframes confettiFall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}
#app{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 16px 40px;position:relative;overflow:hidden;}
.deco{position:fixed;pointer-events:none;z-index:0;font-size:22px;opacity:0.35;}
.btn{border:none;cursor:pointer;font-family:inherit;font-weight:800;transition:transform 0.15s;}
.btn:active{transform:scale(0.94)!important;}
.start-wrap{width:100%;max-width:500px;z-index:1;animation:bounceIn 0.5s both;}
.level-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.level-btn{border-radius:20px;padding:18px 12px;text-align:center;color:#fff;box-shadow:0 6px 20px rgba(214,51,132,0.25);}
.game-wrap{width:100%;max-width:560px;z-index:1;}
.q-card{background:rgba(255,255,255,0.85);border-radius:28px;padding:28px 20px 24px;box-shadow:0 8px 32px rgba(255,105,180,0.18);border:2px solid rgba(255,105,180,0.2);margin-bottom:20px;}
.item-box{background:rgba(255,255,255,0.7);border:3px solid rgba(255,105,180,0.3);border-radius:24px;padding:16px 20px;min-width:110px;text-align:center;transition:all 0.2s;}
.item-box.hl{background:rgba(255,105,180,0.15);border-color:#FF69B4;}
.emoji-grid{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;max-width:120px;margin:0 auto 8px;}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.opt{border-radius:18px;padding:16px 10px;font-size:22px;font-weight:900;color:#fff;text-shadow:1px 1px 2px rgba(0,0,0,0.15);}
.result-card{background:rgba(255,255,255,0.9);border-radius:32px;padding:36px 28px;box-shadow:0 12px 40px rgba(214,51,132,0.2);border:2px solid rgba(255,105,180,0.25);}
.perfect-msg{background:linear-gradient(135deg,#FFD700,#FFA500);color:#fff;border-radius:20px;padding:14px 20px;font-size:17px;font-weight:900;margin:16px 0;line-height:1.6;}
.confetti-piece{position:fixed;top:-20px;pointer-events:none;z-index:999;}

/* ── 학습 화면 ── */
.learn-wrap{width:100%;max-width:560px;z-index:1;}
.learn-tabs{display:flex;gap:10px;justify-content:center;margin-bottom:18px;}
.learn-tab{border-radius:20px;padding:9px 22px;font-size:14px;font-weight:800;cursor:pointer;border:none;font-family:inherit;transition:transform 0.15s;}
.learn-tab:active{transform:scale(0.95);}
.learn-card{background:rgba(255,255,255,0.88);border-radius:28px;padding:24px 20px;box-shadow:0 8px 32px rgba(255,105,180,0.16);border:2px solid rgba(255,105,180,0.18);margin-bottom:16px;min-height:260px;}
.learn-eq{text-align:center;font-size:34px;font-weight:900;color:#D63384;margin-bottom:20px;letter-spacing:4px;}
.learn-visual{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;align-items:flex-start;min-height:100px;padding:8px;}
.learn-msg{text-align:center;font-size:16px;font-weight:800;color:#D63384;min-height:32px;margin-top:12px;line-height:1.4;}
.ei{position:relative;display:inline-flex;flex-direction:column;align-items:center;gap:2px;}
.ei .emo{font-size:32px;line-height:1;}
.ei .num{font-size:11px;font-weight:900;color:#fff;background:#FF69B4;border-radius:8px;padding:1px 5px;min-width:18px;text-align:center;}
.ei.red .emo{filter:grayscale(0.2);}
.ei.red::after{content:"✕";position:absolute;top:-4px;right:-4px;font-size:14px;color:#E74C3C;font-weight:900;}
.ei.gone{opacity:0;transform:scale(0);transition:all 0.4s;}
.ei.glow .emo{filter:drop-shadow(0 0 6px #56AB2F);}
@keyframes slideRight{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes zoomIn{from{transform:scale(0.3);opacity:0}50%{transform:scale(1.2)}to{transform:scale(1);opacity:1}}
.pick-row{display:flex;align-items:center;justify-content:center;gap:16px;margin:16px 0;}
.pick-num{font-size:42px;font-weight:900;color:#D63384;min-width:54px;text-align:center;}
.pick-btn{width:34px;height:34px;border-radius:50%;border:none;font-size:18px;font-weight:900;cursor:pointer;color:#fff;display:flex;align-items:center;justify-content:center;font-family:inherit;}
</style>
</head>
<body>
<div id="app"></div>
<script>
var ITEMS=[
  {e:"🍎",n:"사과"},{e:"🍊",n:"귤"},{e:"🍋",n:"레몬"},{e:"🍇",n:"포도"},
  {e:"🍓",n:"딸기"},{e:"🥐",n:"크루아상"},{e:"🍫",n:"초콜릿"},
  {e:"🍬",n:"사탕"},{e:"🍭",n:"막대사탕"},{e:"🍮",n:"젤리"},
  {e:"🧁",n:"컵케이크"},{e:"🍰",n:"케이크"}
];
var LEVELS=[
  {id:1,name:"🌱 쉬움",sub:"1~9",unit:1,max:9},
  {id:2,name:"🌿 보통",sub:"10단위",unit:10,max:90},
  {id:3,name:"🌳 어려움",sub:"100단위",unit:100,max:900},
  {id:4,name:"⭐ 고수",sub:"1000단위",unit:1000,max:9000}
];
var LCOLS=["linear-gradient(135deg,#FFB6C1,#FF69B4)","linear-gradient(135deg,#FFD700,#FFA500)","linear-gradient(135deg,#DDA0DD,#BA55D3)","linear-gradient(135deg,#98FB98,#3CB371)"];
var CCOLS=["#FF6B9D","#FFD700","#7EC8E3","#FF9F43","#A29BFE","#55EFC4","#FD79A8","#FDCB6E"];
var QN=10;
function rnd(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[rnd(0,arr.length-1)];}

function snd(type){
  try{
    var ctx=new(window.AudioContext||window.webkitAudioContext)();
    function p(f,t,d,v){v=v||0.25;var o=ctx.createOscillator(),g=ctx.createGain();o.connect(g);g.connect(ctx.destination);o.type="sine";o.frequency.value=f;g.gain.setValueAtTime(v,t);g.gain.exponentialRampToValueAtTime(0.001,t+d);o.start(t);o.stop(t+d+0.01);}
    var n=ctx.currentTime;
    if(type==="correct"){p(523,n,0.12);p(659,n+0.12,0.12);p(784,n+0.24,0.25);}
    else if(type==="wrong"){p(220,n,0.08);p(196,n+0.1,0.3,0.15);}
    else if(type==="celebrate"){var m=[523,659,784,1047,784,1047,1319,1047,1319];m.forEach(function(f,i){p(f,n+i*0.13,0.18,0.3);});}
    else if(type==="tick"){p(880,n,0.06,0.1);}
  }catch(e){}
}

function makeQ(level){
  var lv=LEVELS[level-1],steps=lv.max/lv.unit;
  var a=rnd(1,steps)*lv.unit,b=rnd(1,steps)*lv.unit;
  var op=Math.random()>0.45?"+":" -";
  if(op===" -"&&a<b){var t=a;a=b;b=t;}
  var ans=op==="+"?a+b:a-b;
  var i1=pick(ITEMS),i2=pick(ITEMS.filter(function(x){return x.e!==i1.e;}));
  var spread=Math.max(lv.unit*2,Math.floor(ans*0.4));
  var opts=[ans],tries=0;
  while(opts.length<4&&tries<200){
    tries++;
    var d=lv.unit*rnd(1,Math.max(1,Math.floor(spread/lv.unit)));
    var c=Math.random()>0.5?ans+d:ans-d;
    if(c>0&&opts.indexOf(c)===-1)opts.push(c);
  }
  opts.sort(function(){return Math.random()-0.5;});
  return{a:a,b:b,op:op,ans:ans,i1:i1,i2:i2,opts:opts};
}

function spawnConfetti(){
  document.querySelectorAll(".confetti-piece").forEach(function(e){e.remove();});
  for(var i=0;i<60;i++){
    var d=document.createElement("div");d.className="confetti-piece";
    var sz=rnd(8,16),circ=Math.random()>0.5;
    d.style.cssText="left:"+rnd(0,100)+"%;width:"+sz+"px;height:"+(circ?sz:Math.round(sz*0.6))+"px;background:"+CCOLS[i%CCOLS.length]+";border-radius:"+(circ?"50%":"3px")+";transform:rotate("+rnd(0,360)+"deg);animation:confettiFall "+(1.5+Math.random()*2).toFixed(2)+"s "+(Math.random()*2).toFixed(2)+"s ease-in forwards;";
    document.body.appendChild(d);
  }
  setTimeout(function(){document.querySelectorAll(".confetti-piece").forEach(function(e){e.remove();});},5000);
}

function decos(){
  var emojis=["🌸","🍬","✨","🌸","🍭","💕","✨","🌸"];
  var tops=[8,15,75,85,10,80,45,55],lefts=[5,90,3,93,48,50,2,95];
  return emojis.map(function(e,i){return '<span class="deco" style="top:'+tops[i]+'%;left:'+lefts[i]+'%;animation:float '+(2.5+i*0.4)+'s '+(i*0.35)+'s ease-in-out infinite">'+e+'</span>';}).join("");
}

function itemBox(item,count,level,hl){
  var showGrid=level===1&&count<=9;
  var cls="item-box"+(hl?" hl":"");
  var inner="";
  if(showGrid){
    var emojis="";for(var i=0;i<count;i++)emojis+='<span style="font-size:28px;line-height:1;display:block;animation:popIn 0.3s '+(i*0.05).toFixed(2)+'s both">'+item.e+'</span>';
    inner='<div class="emoji-grid">'+emojis+'</div>';
  }else{
    inner='<span style="font-size:52px;display:block;margin-bottom:8px;line-height:1">'+item.e+'</span>';
  }
  return '<div class="'+cls+'">'+inner+'<div style="font-size:'+(level===1?"22":"28")+'px;font-weight:900;color:#D63384">'+count.toLocaleString()+'</div><div style="font-size:11px;color:#E91E8C;margin-top:2px;font-weight:600;opacity:0.7">'+item.n+'</div></div>';
}

var S={screen:"start",level:1,qs:[],qi:0,score:0,status:"playing",chosen:null};
var timer=null;


/* ════════════════════════════════
   학습 화면
════════════════════════════════ */
var LN={type:"add",a:7,b:6,i1:ITEMS[0],i2:ITEMS[7]};
var lTimers=[];
function lClear(){lTimers.forEach(clearTimeout);lTimers=[];}
function lat(ms,fn){lTimers.push(setTimeout(fn,ms));}

function setLearn(t){
  lClear();
  LN.type=t;
  if(t==="add"){LN.a=7;LN.b=6;}else{LN.a=13;LN.b=5;}
  LN.i1=ITEMS[0];LN.i2=ITEMS[7];
  render();
  lat(200,playLearnAnim);
}

function changePick(which,delta){
  lClear();
  if(which==="a"){LN.a=Math.max(1,Math.min(LN.type==="add"?9:15,LN.a+delta));}
  else{LN.b=Math.max(1,Math.min(LN.type==="add"?9:LN.a-1,LN.b+delta));}
  render();
  lat(200,playLearnAnim);
}

function goLearn(){
  lClear();S.screen="learn";
  LN={type:"add",a:7,b:6,i1:ITEMS[0],i2:ITEMS[7]};
  render();
  lat(200,playLearnAnim);
}

function renderLearn(){
  var isAdd=LN.type==="add";
  var tabA='<button class="btn learn-tab" style="background:'+(isAdd?"linear-gradient(135deg,#FF69B4,#FF1493)":"rgba(255,182,193,0.25)")+';color:'+(isAdd?"#fff":"#D63384")+'" onclick="setLearn(\'add\')">➕ 덧셈</button>';
  var tabS='<button class="btn learn-tab" style="background:'+(!isAdd?"linear-gradient(135deg,#DDA0DD,#BA55D3)":"rgba(221,160,221,0.25)")+';color:'+(!isAdd?"#fff":"#9C27B0")+'" onclick="setLearn(\'sub\')">➖ 뺄셈</button>';

  var pickA='<div class="pick-row">'
    +'<button class="pick-btn btn" style="background:#FFB6C1" onclick="changePick(\'a\',-1)">−</button>'
    +'<span class="pick-num" id="pA">'+LN.a+'</span>'
    +'<button class="pick-btn btn" style="background:#FF69B4" onclick="changePick(\'a\',1)">+</button>'
    +'<span style="font-size:28px;font-weight:900;color:#FF1493;margin:0 4px">'+(isAdd?'+':'−')+'</span>'
    +'<button class="pick-btn btn" style="background:#DDA0DD" onclick="changePick(\'b\',-1)">−</button>'
    +'<span class="pick-num" id="pB">'+LN.b+'</span>'
    +'<button class="pick-btn btn" style="background:#BA55D3" onclick="changePick(\'b\',1)">+</button>'
    +'<span style="font-size:28px;font-weight:900;color:#FF1493;margin:0 4px">= ?</span>'
    +'</div>';

  return decos()+'<div class="learn-wrap">'
    +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">'
    +'<button class="btn" style="background:rgba(255,105,180,0.15);color:#D63384;border-radius:14px;padding:8px 16px;font-size:13px;font-weight:800;border:none;font-family:inherit" onclick="goStart()">← 처음</button>'
    +'<div class="learn-tabs">'+tabA+tabS+'</div>'
    +'<div style="width:70px"></div>'
    +'</div>'
    +pickA
    +'<div class="learn-card">'
    +'<div class="learn-eq" id="leq">'+LN.a+(isAdd?' + ':' − ')+LN.b+' = <span id="lans" style="color:#FF69B4">?</span></div>'
    +'<div class="learn-visual" id="lvis"></div>'
    +'<div class="learn-msg" id="lmsg">▶ 아래서 숫자를 바꿔보세요!</div>'
    +'</div>'
    +'<div style="display:flex;gap:12px;justify-content:center">'
    +'<button class="btn" style="background:linear-gradient(135deg,#FF69B4,#FF1493);color:#fff;border-radius:16px;padding:12px 24px;font-size:14px;font-weight:800;border:none;font-family:inherit;box-shadow:0 4px 14px rgba(255,105,180,0.35)" onclick="lClear();playLearnAnim()">▶ 다시 보기</button>'
    +'</div>'
    +'</div>';
}

function makeEmojiItem(emoji,num,cls){
  var n=num!==undefined?'<span class="num" style="animation:zoomIn 0.3s both">'+num+'</span>':'';
  return '<div class="ei'+(cls?' '+cls:'')+'"><span class="emo">'+emoji+'</span>'+n+'</div>';
}

function playLearnAnim(){
  var vis=document.getElementById('lvis');
  var msg=document.getElementById('lmsg');
  var ans=document.getElementById('lans');
  if(!vis||!msg)return;
  vis.innerHTML='';msg.textContent='';
  var isAdd=LN.type==="add";
  var a=LN.a,b=LN.b,total=isAdd?a+b:a;
  var e1=LN.i1.e,e2=LN.i2.e;

  if(isAdd){
    // ── 덧셈 애니메이션 ──
    // 1: A그룹 등장
    lat(0,function(){
      msg.textContent=e1+' 가 '+a+'개 있어요!';
      var h='';
      for(var i=0;i<a;i++)h+='<div class="ei" style="animation:popIn 0.3s '+(i*0.08).toFixed(2)+'s both"><span class="emo">'+e1+'</span></div>';
      vis.innerHTML=h;
      snd("tick");
    });
    // 2: B그룹 등장
    lat(a*80+600,function(){
      msg.textContent=e2+' '+b+'개를 더 가져와요!';
      var h=vis.innerHTML;
      h+='<div style="font-size:28px;font-weight:900;color:#FF1493;align-self:center;margin:0 4px;animation:bounceIn 0.3s both">+</div>';
      for(var i=0;i<b;i++)h+='<div class="ei" style="animation:slideRight 0.35s '+(i*0.09).toFixed(2)+'s both"><span class="emo">'+e2+'</span></div>';
      vis.innerHTML=h;
      snd("tick");
    });
    // 3: 합치기
    var t3=a*80+b*90+1400;
    lat(t3,function(){
      msg.textContent='모두 합쳐서 세어봐요! 🔢';
      var h='';
      for(var i=0;i<a;i++)h+='<div class="ei" style="animation:popIn 0.15s '+(i*0.06).toFixed(2)+'s both"><span class="emo">'+e1+'</span><span class="num" style="animation:zoomIn 0.3s '+(i*0.06+0.2).toFixed(2)+'s both">'+(i+1)+'</span></div>';
      for(var i=0;i<b;i++)h+='<div class="ei" style="animation:popIn 0.15s '+((a+i)*0.06).toFixed(2)+'s both"><span class="emo">'+e2+'</span><span class="num" style="animation:zoomIn 0.3s '+((a+i)*0.06+0.2).toFixed(2)+'s both">'+(a+i+1)+'</span></div>';
      vis.innerHTML=h;
    });
    // 4: 결과
    lat(t3+(a+b)*60+800,function(){
      msg.innerHTML='<span style="font-size:22px">'+a+' + '+b+' = <span style="color:#FF1493;font-size:28px">'+( a+b)+'</span> 🎉</span>';
      if(ans)ans.innerHTML='<span style="animation:bounceIn 0.4s both;display:inline-block;color:#FF1493">'+(a+b)+'</span>';
      snd("correct");
    });

  } else {
    // ── 뺄셈 애니메이션 ──
    // 1: 전체 등장
    lat(0,function(){
      msg.textContent=e1+' 가 '+a+'개 있어요!';
      var h='';
      for(var i=0;i<a;i++)h+='<div class="ei" style="animation:popIn 0.3s '+(i*0.07).toFixed(2)+'s both"><span class="emo">'+e1+'</span></div>';
      vis.innerHTML=h;
      snd("tick");
    });
    // 2: 빼는 것 표시
    lat(a*70+700,function(){
      msg.textContent='이 중에서 '+b+'개를 빼볼게요! ✕';
      var items=vis.querySelectorAll('.ei');
      for(var i=a-b;i<a;i++){if(items[i])items[i].className='ei red';}
    });
    // 3: 사라짐
    lat(a*70+1700,function(){
      msg.textContent=b+'개가 사라졌어요!';
      var items=vis.querySelectorAll('.ei.red');
      items.forEach(function(el){
        el.style.animation='popIn 0.4s reverse both';
        el.style.opacity='0';el.style.transform='scale(0)';el.style.transition='all 0.5s';
      });
      snd("wrong");
    });
    // 4: 남은 것 세기
    lat(a*70+2700,function(){
      msg.textContent='남은 걸 세어봐요! 🔢';
      var h='';
      var rem=a-b;
      for(var i=0;i<rem;i++)h+='<div class="ei glow" style="animation:popIn 0.2s '+(i*0.07).toFixed(2)+'s both"><span class="emo">'+e1+'</span><span class="num" style="animation:zoomIn 0.3s '+(i*0.07+0.2).toFixed(2)+'s both">'+(i+1)+'</span></div>';
      vis.innerHTML=h;
    });
    // 5: 결과
    lat(a*70+4200,function(){
      var rem=a-b;
      msg.innerHTML='<span style="font-size:22px">'+a+' − '+b+' = <span style="color:#FF1493;font-size:28px">'+rem+'</span> 🎉</span>';
      if(ans)ans.innerHTML='<span style="animation:bounceIn 0.4s both;display:inline-block;color:#FF1493">'+rem+'</span>';
      snd("correct");
    });
  }
}
function render(){
  var app=document.getElementById("app");
  if(S.screen==="start") app.innerHTML=renderStart();
  else if(S.screen==="learn") app.innerHTML=renderLearn();
  else if(S.screen==="game") app.innerHTML=renderGame();
  else if(S.screen==="result") app.innerHTML=renderResult();
}

function renderStart(){
  var btns=LEVELS.map(function(lv,i){
    return '<button class="btn level-btn" style="background:'+LCOLS[i]+'" onclick="startGame('+lv.id+')"><span style="font-size:28px;display:block;margin-bottom:6px">'+lv.name.split(" ")[0]+'</span><span style="font-size:15px;font-weight:800;display:block">'+lv.name.split(" ").slice(1).join(" ")+'</span><span style="font-size:12px;opacity:0.9;font-weight:600;display:block;margin-top:4px">'+lv.sub+'</span></button>';
  }).join("");
  return decos()+'<div class="start-wrap"><div style="text-align:center;margin-bottom:32px"><span style="font-size:64px;animation:float 2s ease-in-out infinite;line-height:1;display:block;margin-bottom:12px">🍭</span><div style="font-size:36px;font-weight:900;color:#D63384;text-shadow:2px 2px 0 rgba(255,105,180,0.3);margin-bottom:6px">달콤한 수학</div><div style="color:#E91E8C;font-size:15px;font-weight:600;opacity:0.8">과일이랑 간식으로 배우는 덧셈 뺄셈! 🍎🍫</div></div><p style="text-align:center;color:#C2185B;font-weight:700;font-size:14px;margin-bottom:16px">단계를 골라봐요!</p><div class="level-grid">'+btns+'</div><p style="text-align:center;margin-top:24px;font-size:13px;color:#E91E8C;opacity:0.7;font-weight:600">문제는 '+QN+'개 · 덧셈과 뺄셈 💪</p><button class=\"btn\" style=\"display:block;margin:18px auto 0;background:linear-gradient(135deg,#FFD700,#FFA500);color:#fff;border-radius:16px;padding:12px 32px;font-size:15px;font-weight:900;border:none;font-family:inherit;box-shadow:0 4px 14px rgba(255,165,0,0.35)\" onclick=\"goLearn()\">📚 덧셈 뺄셈 배우기</button></div>';
}

function renderGame(){
  var q=S.qs[S.qi];
  var hl=S.status==="correct";
  var pct=Math.round((S.qi/QN)*100);
  var optBtns=q.opts.map(function(opt){
    var bg="linear-gradient(135deg,#FFB6C1,#FF8FAB)",col="#fff",sc="";
    if(S.chosen!==null){
      if(opt===q.ans){bg="linear-gradient(135deg,#A8E063,#56AB2F)";}
      else if(opt===S.chosen){bg="linear-gradient(135deg,#FF6B6B,#EE0979)";}
      else{bg="rgba(255,200,220,0.4)";col="rgba(233,30,140,0.5)";}
      if(opt===q.ans)sc="transform:scale(1.04);";
    }
    return '<button class="btn opt" style="background:'+bg+';color:'+col+';box-shadow:0 4px 16px rgba(255,105,180,0.25);'+sc+'" onclick="answer('+opt+')">'+opt.toLocaleString()+'</button>';
  }).join("");
  var feedback="";
  if(S.status!=="playing"){
    feedback='<div style="text-align:center;margin-top:18px;animation:bounceIn 0.3s both">';
    if(S.status==="correct")feedback+='<span style="font-size:32px">🎉</span><span style="font-size:22px;font-weight:900;color:#27AE60"> 정답이에요!</span><span style="font-size:32px"> ✨</span>';
    else feedback+='<span style="font-size:32px">😅</span><span style="font-size:18px;font-weight:800;color:#E74C3C"> 정답은 <span style="font-size:24px;color:#D63384">'+q.ans.toLocaleString()+'</span> 이에요!</span>';
    feedback+='</div>';
  }
  var cardAnim=S.status==="correct"?"animation:pulse 0.35s both":S.status==="wrong"?"animation:shake 0.4s both":"";
  return decos()+'<div class="game-wrap"><div style="display:flex;align-items:center;gap:10px;margin-bottom:16px"><div style="flex:1;height:12px;background:rgba(255,105,180,0.2);border-radius:6px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,#FF69B4,#FF1493);border-radius:6px;transition:width 0.4s"></div></div><span style="font-size:13px;font-weight:800;color:#D63384;white-space:nowrap">'+(S.qi+1)+'/'+QN+'</span><span style="background:#FF69B4;color:#fff;border-radius:20px;padding:3px 12px;font-size:13px;font-weight:900">⭐'+S.score+'</span></div><div class="q-card" style="'+cardAnim+'"><div style="text-align:center;margin-bottom:20px"><span style="background:linear-gradient(90deg,#FF69B4,#FF1493);color:#fff;border-radius:20px;padding:4px 16px;font-size:12px;font-weight:800">'+LEVELS[S.level-1].name+'</span></div><div style="display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap">'+itemBox(q.i1,q.a,S.level,hl)+'<div style="font-size:42px;font-weight:900;color:#FF1493;line-height:1">'+q.op+'</div>'+itemBox(q.i2,q.b,S.level,hl)+'<div style="font-size:38px;font-weight:900;color:#C2185B;line-height:1">=</div><div style="background:linear-gradient(135deg,#FFE4F0,#FFF0F8);border:3px dashed #FF69B4;border-radius:20px;padding:14px 22px;text-align:center;min-width:90px"><span style="font-size:38px;font-weight:900;color:#FF69B4">?</span></div></div>'+feedback+'</div><div class="opts">'+optBtns+'</div></div>';
}

function renderResult(){
  var perf=S.score===QN;
  var stars="";for(var i=0;i<4;i++)stars+='<span style="font-size:24px">'+(S.score>i*2.5?"⭐":"☆")+'</span>';
  var inner="";
  if(perf){
    inner='<span style="font-size:72px;animation:float 1.5s ease-in-out infinite;line-height:1;display:block;margin-bottom:12px">🏆</span><div style="font-size:30px;font-weight:900;color:#D63384;margin-bottom:6px">완벽해요!!</div><div style="font-size:42px;font-weight:900;color:#FF1493;margin-bottom:8px">100점 🌟</div><div class="perfect-msg">🎉 엄마 아빠한테<br>용돈 받으러 가세요! 💰✨</div><div style="font-size:14px;color:#E91E8C;font-weight:600;opacity:0.8">'+QN+'문제 모두 맞혔어요! 정말 대단해요! 👏</div>';
  }else{
    var emoji=S.score>=8?"🥳":S.score>=5?"😊":"😢";
    var msg=S.score>=8?"잘했어요!":S.score>=5?"괜찮아요!":"다시 도전!";
    inner='<div style="font-size:60px;margin-bottom:8px;line-height:1">'+emoji+'</div><div style="font-size:24px;font-weight:900;color:#D63384;margin-bottom:12px">'+msg+'</div><div style="font-size:52px;font-weight:900;color:#FF1493;margin-bottom:4px">'+S.score+'<span style="font-size:24px;color:#E91E8C;opacity:0.6">/'+QN+'</span></div><div style="margin-bottom:16px">'+stars+'</div>'+(S.score<QN?'<p style="color:#C2185B;font-size:13px;font-weight:600;margin-bottom:4px;opacity:0.8">100점 맞으면 용돈 받을 수 있어요! 💰<br>조금만 더 화이팅!</p>':"");
  }
  return decos()+'<div style="width:100%;max-width:480px;z-index:1;animation:bounceIn 0.6s both;text-align:center"><div class="result-card">'+inner+'<div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:20px"><button class="btn" style="background:linear-gradient(135deg,#FF69B4,#FF1493);color:#fff;border-radius:16px;padding:12px 24px;font-size:15px;box-shadow:0 4px 16px rgba(255,105,180,0.35)" onclick="startGame('+S.level+')">🔄 다시 도전!</button><button class="btn" style="background:linear-gradient(135deg,#DDA0DD,#BA55D3);color:#fff;border-radius:16px;padding:12px 24px;font-size:15px;box-shadow:0 4px 16px rgba(186,85,211,0.35)" onclick="goStart()">🏠 단계 선택</button></div></div></div>';
}

function startGame(lvl){
  snd("tick");clearTimeout(timer);
  S={screen:"game",level:lvl,qs:[],qi:0,score:0,status:"playing",chosen:null};
  for(var i=0;i<QN;i++)S.qs.push(makeQ(lvl));
  render();
}

function answer(opt){
  if(S.status!=="playing")return;
  var q=S.qs[S.qi];
  var ok=opt===q.ans;
  snd(ok?"correct":"wrong");
  S.chosen=opt;S.status=ok?"correct":"wrong";
  if(ok)S.score++;
  render();
  clearTimeout(timer);
  timer=setTimeout(function(){
    if(S.qi+1>=QN){
      var perf=S.score===QN;
      S.screen="result";render();
      if(perf){spawnConfetti();setTimeout(function(){snd("celebrate");},400);}
    }else{
      S.qi++;S.status="playing";S.chosen=null;render();
    }
  },1300);
}

function goStart(){
  clearTimeout(timer);
  document.querySelectorAll(".confetti-piece").forEach(function(e){e.remove();});
  S={screen:"start",level:1,qs:[],qi:0,score:0,status:"playing",chosen:null};
  render();
}

render();
</script>
</body>
</html>
